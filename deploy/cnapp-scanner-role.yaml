AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  KIZEN CNAPP — read-only cross-account scanner role. Creates CnappScannerRole,
  assumable ONLY by the CNAPP hub role and ONLY under the sts:ExternalId issued at
  onboarding (confused-deputy guard). Grants read-only (describe/list) access to
  configuration and IAM — NO customer workload DATA reads, NO write actions.

Parameters:
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: >-
      Per-customer STS ExternalId issued by the CNAPP hub during onboarding. Paste
      the value from the onboarding screen. Server-generated — never invent your own.
  HubRoleArn:
    Type: String
    Default: arn:aws:iam::HUB_ACCOUNT_ID:role/CnappHubRole
    AllowedPattern: '^arn:aws:iam::\d{12}:role/.+$'
    Description: The CNAPP hub role ARN (the sole trusted principal).

Resources:
  CnappScannerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CnappScannerRole            # fixed name => predictable per-account ARN
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCnappHubAssumeWithExternalId
            Effect: Allow
            Principal:
              AWS: !Ref HubRoleArn          # the HUB ROLE, never account-root
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit
        - arn:aws:iam::aws:policy/job-function/ViewOnlyAccess
        # NOTE: intentionally NOT ReadOnlyAccess — that grants workload DATA reads
        # (s3:GetObject, dynamodb:GetItem, sqs:ReceiveMessage, ...) which would
        # violate the read-only-of-CONFIG contract. SecurityAudit + ViewOnlyAccess
        # are the tighter list/describe surface a CNAPP actually needs.
        #
        # ── OPTIONAL: EKS KSPM/KIEM Kubernetes-API layer ─────────────────────────
        # The always-on KIEM (EKS Access Entries + Pod Identity) needs NOTHING beyond
        # the eks:List*/Describe* already in SecurityAudit above. To ALSO read in-cluster
        # RBAC / Pod-Security / NetworkPolicies (the KSPM-01..07 + RBAC-graph layer),
        # grant this role a READ-ONLY Kubernetes access entry on each target cluster
        # (a WRITE the scanner never performs itself — run it once at onboarding):
        #   aws eks create-access-entry --cluster-name <CLUSTER> \
        #       --principal-arn <THIS_ROLE_ARN> --type STANDARD
        #   aws eks associate-access-policy --cluster-name <CLUSTER> \
        #       --principal-arn <THIS_ROLE_ARN> --access-scope type=cluster \
        #       --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSViewPolicy
        # AmazonEKSViewPolicy covers pods/SA/PSA/NetworkPolicy. For the RBAC identity
        # graph (list roles/bindings) use AmazonEKSAdminViewPolicy, or — least privilege —
        # bind a custom read-only ClusterRole (get/list/watch on rbac.authorization.k8s.io
        # + core, EXCLUDING secrets) to a K8s group mapped via the access entry's
        # kubernetesGroups. The cluster API endpoint must also be reachable from the hub
        # (public endpoint, or run the hub in-VPC / via PrivateLink for a private endpoint);
        # otherwise OverWatch fails open with a KSPM-00 INFO. The scanner only ever GETs.
      Policies:
        - PolicyName: CnappScannerReadOnlyExtras
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CiemLastAccessed
                Effect: Allow
                Action:
                  - iam:GenerateServiceLastAccessedDetails
                  - iam:GetServiceLastAccessedDetails
                  - iam:GetServiceLastAccessedDetailsWithEntities
                Resource: '*'
              - Sid: ConfigReadGapsManagedPoliciesMiss
                Effect: Allow
                Action:
                  - ec2:GetEbsEncryptionByDefault
                  - ec2:GetEbsDefaultKmsKeyId
                  - ec2:GetSnapshotBlockPublicAccessState
                  - access-analyzer:ValidatePolicy
                Resource: '*'
      Tags:
        - { Key: 'cnapp:managed', Value: 'true' }

  # ── OPT-IN ONLY (disabled by default) ──────────────────────────────────────
  # Agentless EBS workload side-scan needs snapshot-lifecycle WRITE actions
  # (CreateSnapshot on a customer volume, share to the hub, cleanup). These are
  # writes and touch a customer resource, so they are NOT in the default role.
  # To enable: set the EnableSideScan condition and attach CnappSideScanSnapshotOps
  # (tag-scoped to cnapp:sidescan; mirrors aws_sidescan_ebs OWNER_TAG / is_owned).
  #
  #   - PolicyName: CnappSideScanSnapshotOps
  #     PolicyDocument:
  #       Version: '2012-10-17'
  #       Statement:
  #         - Effect: Allow
  #           Action: [ ebs:ListSnapshotBlocks, ebs:ListChangedBlocks, ebs:GetSnapshotBlock,
  #                     ec2:DescribeSnapshots ]
  #           Resource: '*'
  #         - Effect: Allow
  #           Action: [ ec2:CreateSnapshot ]
  #           Resource: 'arn:aws:ec2:*:*:volume/*'
  #         - Effect: Allow
  #           Action: [ ec2:CreateTags, ec2:CopySnapshot, ec2:ModifySnapshotAttribute,
  #                     ec2:DeleteSnapshot ]
  #           Resource: 'arn:aws:ec2:*:*:snapshot/*'
  #           Condition: { StringEquals: { 'aws:ResourceTag/cnapp:sidescan': 'true' } }

  # ── OPT-IN ONLY (disabled by default) ──────────────────────────────────────
  # Agentless VPC Flow-Log observed-traffic overlay (--flow-logs → FLOW-01/02/03): evidence-
  # based SG scope-down, unused-port, and reject-talker analysis. It reads flow-log CONTENT
  # via CloudWatch Logs Insights. Neither SecurityAudit nor ViewOnlyAccess grants a log-
  # CONTENT read (only logs:Describe*/GetLogDelivery), and this crosses the read-only-of-
  # CONFIG line by ACTION CLASS — the same class ReadOnlyAccess's s3:GetObject is deliberately
  # excluded to avoid (see note above). So it is opt-in, least-privilege, and resource-scoped
  # to the specific flow-log log-group(s). CloudWatch Logs Insights bills per GB SCANNED;
  # OverWatch bounds cost with a short, server-side-aggregated window and FAILS OPEN to a
  # FLOW-00 note when the grant is absent (Layer-A SG micro-segmentation, SEG-01..06, is
  # always on and needs NONE of this). Reading the flow-log CONFIG (ec2:DescribeFlowLogs) is
  # already granted. To enable, attach CnappFlowLogInsights, scoping the StartQuery Resource
  # to the log-group ARN(s) from `aws ec2 describe-flow-logs` (LogGroupName):
  #
  #   - PolicyName: CnappFlowLogInsights
  #     PolicyDocument:
  #       Version: '2012-10-17'
  #       Statement:
  #         - Effect: Allow
  #           Action: [ logs:StartQuery ]
  #           Resource: 'arn:aws:logs:*:<ACCOUNT_ID>:log-group:<FLOW_LOG_LOG_GROUP>:*'
  #         - Effect: Allow    # GetQueryResults/StopQuery authorize on the queryId, not a
  #           Action: [ logs:GetQueryResults, logs:StopQuery ]   # log-group ARN, so Resource
  #           Resource: '*'    # is '*' — they only read a query THIS role started.
  #
  # The S3-delivered flow-log path (s3:GetObject + gunzip/parquet) is deliberately NOT
  # supported — it needs the exact s3:GetObject the role excludes. Use a CloudWatch Logs
  # flow-log destination for the overlay, or leave Layer B off.

  # ── OPTIONAL: expanded DSPM datastore surfaces ──────────────────────────────
  # The DSPM crown-jewel classifier (DSPM-01/02/03) covers S3/RDS/Aurora/DocumentDB/Neptune/
  # Redshift/DynamoDB/EFS/OpenSearch using describe/list APIs already in SecurityAudit. Four
  # additional stores (Kinesis, MemoryDB, FSx, Timestream) use describes that may not be in the
  # base managed policies; grant them read-only if you want those stores classified (all are
  # metadata-only — NO data-plane / GetRecords / GetItem). Absent → a DSPM-01 INFO naming the
  # store, never a false all-clear.
  #
  #   - PolicyName: CnappDspmSurfaces
  #     PolicyDocument:
  #       Version: '2012-10-17'
  #       Statement:
  #         - Effect: Allow
  #           Action: [ kinesis:ListStreams, kinesis:DescribeStreamSummary, kinesis:ListTagsForStream,
  #                     memorydb:DescribeClusters, memorydb:ListTags,
  #                     fsx:DescribeFileSystems,
  #                     timestream:ListDatabases, timestream:ListTables, timestream:ListTagsForResource ]
  #           Resource: '*'      # all read-only list/describe; no secret/data read
  #
  # Least-privilege policy generation (CIEM-02) and AWS-resident-secrets posture (SECRET-*) need
  # NO new grant: SLAD (iam:GenerateServiceLastAccessedDetails/GetServiceLastAccessedDetails) is
  # already granted above, and secrets use ssm:DescribeParameters (SecurityAudit) + secretsmanager
  # List/Describe only — never ssm:GetParameter / secretsmanager:GetSecretValue (the value reads).
  #
  # ── AI-SPM + CDR-lite + cloud-forensics (v2.26) — NO new grant by default ────
  # AI-SPM (AISPM-01..03 + AIPATH-01) reads bedrock/bedrock-agent/sagemaker list/describe/get (all
  # in SecurityAudit) and reuses the cached IAM principals — zero new API. CDR-lite is a PUSH plane:
  # the operator streams GuardDuty/Security Hub/CloudTrail detection events to POST /detections and
  # OverWatch makes ZERO AWS calls to fold them (it works off the uploaded events + the stored
  # graph). The cloud-forensics timeline uses cloudtrail:LookupEvents (management events ONLY — never
  # a data/secret read), which SecurityAudit already grants; absent/denied → a FORENSIC-00 fail-open
  # note, never a phantom clean timeline. If a deployment tightens the role below SecurityAudit, add
  # a read-only opt-in mirroring the blocks above:
  #
  #   - PolicyName: CnappCdrForensicsRead
  #     PolicyDocument:
  #       Version: '2012-10-17'
  #       Statement:
  #         - Effect: Allow
  #           Action: [ cloudtrail:LookupEvents, securityhub:GetFindings,
  #                     guardduty:ListDetectors, guardduty:GetDetector, guardduty:ListFindings,
  #                     guardduty:GetFindings ]
  #           Resource: '*'      # all read-only mgmt-plane lookups; no data/secret-value read

Outputs:
  RoleArn:
    Description: Paste this into the CNAPP hub tenant registry.
    Value: !GetAtt CnappScannerRole.Arn
  ExternalIdReminder:
    Description: The ExternalId is stored only in the CNAPP hub secret store.
    Value: 'Configured (NoEcho)'

# Deploy notes:
#  * Requires CAPABILITY_NAMED_IAM (fixed RoleName).
#  * IAM is global — deploy in exactly ONE region per account (a second region
#    errors on the duplicate global role).
#  * Quick-create URL (params pre-filled) is produced by cnapp_onboarding.init_onboarding.
