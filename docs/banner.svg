<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="OverWatch — agentless AWS CNAPP: correlates internet to exposed workload to exploitable CVE to over-privileged role to crown-jewel data into ranked attack paths and choke points">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="1" stop-color="#080d16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.55" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="conn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142033"/>
      <stop offset="1" stop-color="#0d1626"/>
    </linearGradient>
    <linearGradient id="estate1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="estate2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#3730a3" stop-opacity="0.30"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="chokeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b53d" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#f5b53d" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="card"><rect x="0" y="0" width="800" height="240" rx="18"/></clipPath>
    <style>
      .wm  { font-family: system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
      .mono{ font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .cap { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size: 8px; fill: #93a7c6; }
      .nl  { font-family: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size: 8.5px; fill: #e6eef9; }
    </style>
  </defs>

  <g clip-path="url(#card)">
    <rect x="0" y="0" width="800" height="240" fill="url(#bg)"/>
    <rect x="0" y="0" width="800" height="240" fill="url(#glow)"/>

    <!-- ===== Wordmark: shield + all-seeing eye watching the crown jewel ===== -->
    <g transform="translate(40,46)">
      <path d="M0 -15 L21 -22 L42 -15 L42 4 Q42 19 21 27 Q0 19 0 4 Z" fill="url(#node)" stroke="url(#accent)" stroke-width="1.6"/>
      <path d="M8 3 Q21 -8 34 3 Q21 14 8 3 Z" fill="none" stroke="#38bdf8" stroke-width="1.8"/>
      <circle cx="21" cy="3" r="4.2" fill="url(#accent)"/>
      <circle cx="21" cy="3" r="1.5" fill="#f5b53d"/>
      <path d="M4 -13 A20 20 0 0 1 38 -13" fill="none" stroke="#6366f1" stroke-width="1.1" stroke-dasharray="2 3" opacity="0.7"/>
      <text x="60" y="9" class="wm" font-size="37" font-weight="700" fill="#e8eff8">Over<tspan fill="url(#accent)">Watch</tspan></text>
      <text x="63" y="28" class="mono" font-size="10" letter-spacing="1.9" fill="#8298b4">AGENTLESS  CNAPP  ·  ATTACK-PATH  GRAPH</text>
    </g>

    <!-- ===== Agentless pillars feeding the graph ===== -->
    <g class="mono" font-size="8.5" fill="#93a7c6" text-anchor="end">
      <text x="84" y="118">config</text>
      <text x="84" y="140">identity</text>
      <text x="84" y="162">workload</text>
    </g>
    <g fill="none" stroke-width="2.2" stroke-linecap="round">
      <path d="M90 114 C118 114 126 140 150 140" stroke="#38bdf8"/>
      <path d="M90 136 C116 136 124 140 150 140" stroke="#60a5fa"/>
      <path d="M90 158 C118 158 126 140 150 140" stroke="#6366f1"/>
    </g>
    <text class="mono" x="150" y="96" font-size="7.5" fill="#6f88a3" text-anchor="middle">cspm · ciem · cwpp · dspm · cdr</text>

    <!-- ===== Connectors + arrows along the attack path ===== -->
    <g stroke="url(#conn)" stroke-width="3" fill="none">
      <line x1="184" y1="140" x2="226" y2="140"/>
      <line x1="296" y1="140" x2="338" y2="140"/>
      <line x1="408" y1="140" x2="450" y2="140"/>
      <line x1="520" y1="140" x2="562" y2="140"/>
    </g>
    <g fill="#6366f1">
      <polygon points="229,140 221,135 221,145"/>
      <polygon points="341,140 333,135 333,145"/>
      <polygon points="453,140 445,135 445,145"/>
      <polygon points="565,140 557,135 557,145"/>
    </g>

    <!-- ===== The toxic chain: INTERNET > EXPOSED > CVE > ROLE(choke) > CROWN ===== -->
    <g text-anchor="middle">
      <!-- INTERNET -->
      <g transform="translate(150,140)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <g fill="none" stroke="#38bdf8" stroke-width="1.7">
          <circle cx="0" cy="-5" r="7"/><ellipse cx="0" cy="-5" rx="3" ry="7"/><line x1="-7" y1="-5" x2="7" y2="-5"/>
        </g>
        <text x="0" y="17" class="nl">INTERNET</text>
        <text x="0" y="34" class="cap">0.0.0.0/0</text>
      </g>
      <!-- EXPOSED -->
      <g transform="translate(262,140)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <rect x="-8" y="-8" width="16" height="10" rx="1.5" fill="none" stroke="#60a5fa" stroke-width="1.7"/>
        <line x1="0" y1="2" x2="0" y2="5" stroke="#60a5fa" stroke-width="1.7"/><line x1="-4" y1="5" x2="4" y2="5" stroke="#60a5fa" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M6 -11 Q11 -11 11 -6" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
        <text x="0" y="17" class="nl">EXPOSED</text>
        <text x="0" y="34" class="cap">public :443</text>
      </g>
      <!-- CVE (KEV) -->
      <g transform="translate(374,140)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <path d="M0 -13 L9 4 L-9 4 Z" fill="none" stroke="#ff3b5c" stroke-width="1.9" stroke-linejoin="round"/>
        <line x1="0" y1="-6" x2="0" y2="-1" stroke="#ff3b5c" stroke-width="1.9" stroke-linecap="round"/>
        <circle cx="0" cy="2" r="1.2" fill="#ff3b5c"/>
        <text x="0" y="17" class="nl" fill="#ffd7de">CVE</text>
        <text x="0" y="34" class="cap" fill="#ff6b85">KEV · exploited</text>
      </g>
      <!-- ROLE = choke point (highlighted) -->
      <g transform="translate(486,140)">
        <circle cx="0" cy="0" r="34" fill="url(#chokeGlow)"/>
        <rect x="-35" y="-24" width="70" height="48" rx="10" fill="none" stroke="#f5b53d" stroke-width="1.4" stroke-dasharray="4 3" opacity="0.85"/>
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.6"/>
        <circle cx="-5" cy="-6" r="4.5" fill="none" stroke="#38bdf8" stroke-width="1.9"/>
        <path d="M-1.6 -2.6 L7 6 M4 3 L7 0 M7 6 L4 9" fill="none" stroke="#38bdf8" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="0" y="17" class="nl">ROLE</text>
        <text x="0" y="34" class="cap" fill="#f5b53d">★ choke · admin</text>
      </g>
      <!-- CROWN jewel data -->
      <g transform="translate(598,140)">
        <rect x="-33" y="-22" width="66" height="44" rx="9" fill="url(#node)" stroke="url(#accent)" stroke-width="1.5"/>
        <path d="M-8 -8 L8 -8 L11 -3 L0 8 L-11 -3 Z" fill="none" stroke="#f5b53d" stroke-width="1.7" stroke-linejoin="round"/>
        <path d="M-8 -8 L-4 -3 L4 -3 L8 -8 M-4 -3 L0 8 L4 -3" fill="none" stroke="#f5b53d" stroke-width="1.1" opacity="0.85"/>
        <text x="0" y="17" class="nl">CROWN</text>
        <text x="0" y="34" class="cap" fill="#f7cd7d">PII · S3 data</text>
      </g>
    </g>

    <!-- ===== Choke-point insight (the headline OverWatch produces) ===== -->
    <path d="M513 118 C548 108 560 92 588 92" fill="none" stroke="#f5b53d" stroke-width="1.6" stroke-dasharray="3 3"/>
    <circle cx="588" cy="92" r="2.2" fill="#f5b53d"/>
    <g text-anchor="end">
      <text class="mono" x="762" y="86" font-size="9.5" font-weight="700" fill="#f5b53d">★ CHOKE POINT</text>
      <text class="mono" x="762" y="99" font-size="8" fill="#c9d6ea">fix 1 → cut 100% of critical paths</text>
    </g>

    <!-- ===== Multi-account estate under watch = the security graph ===== -->
    <g transform="translate(0,190)">
      <path d="M0 6 H800 V50 H0 Z" fill="url(#estate2)"/>
      <path d="M0 13 H800 V50 H0 Z" fill="url(#estate1)"/>
      <line x1="0" y1="13" x2="800" y2="13" stroke="#38bdf8" stroke-width="1" opacity="0.35"/>
      <!-- cross-account graph: account nodes joined by a faint edge line -->
      <line x1="60" y1="25" x2="740" y2="25" stroke="#60a5fa" stroke-width="1" opacity="0.30"/>
      <g>
        <rect x="54" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#38bdf8" stroke-width="1"/>
        <rect x="150" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#60a5fa" stroke-width="1"/>
        <rect x="246" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#38bdf8" stroke-width="1"/>
        <rect x="342" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#6366f1" stroke-width="1"/>
        <rect x="438" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#ff3b5c" stroke-width="1.2"/>
        <rect x="534" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#60a5fa" stroke-width="1"/>
        <rect x="630" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#f5b53d" stroke-width="1.2"/>
        <rect x="726" y="19" width="12" height="12" rx="2.5" fill="url(#node)" stroke="#38bdf8" stroke-width="1"/>
      </g>
      <text class="mono" x="60" y="44" font-size="7.5" fill="#8399ba">multi-account · multi-region · one security graph</text>
      <text class="mono" x="740" y="44" font-size="7.5" fill="#8399ba" text-anchor="end">MITRE ATT&amp;CK-aligned · remediation-as-code</text>
    </g>
  </g>
  <rect x="0.75" y="0.75" width="798.5" height="238.5" rx="17.5" fill="none" stroke="#1e2b47"/>
</svg>
